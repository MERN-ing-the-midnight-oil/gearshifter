# Supabase configuration file
# This file is used by the Supabase CLI

[project]
# Your Supabase project reference ID
# Get this from your Supabase dashboard: Settings > General > Reference ID
# project_id = "your-project-ref"

[auth]
# Phone auth settings are configured in Supabase dashboard

[api]
# API settings
enabled = true
port = 54321

[db]
# Database settings
port = 54322
shadow_port = 54320

[studio]
# Supabase Studio settings
enabled = true
port = 54323

[inbucket]
# Email testing (for local development)
enabled = true
port = 54324

# Edge API gateway JWT check runs before Deno; it can return "Invalid JWT" even when GoTrue accepts
# the same token. The function still validates the caller via auth.getUser(userJwt).
[functions.create-staff-account]
verify_jwt = false

[functions.exchange-seller-session]
verify_jwt = false

[functions.auth-send-sms]
verify_jwt = false

[functions.dev-phone-session-bypass]
verify_jwt = false

[functions.set-seller-dashboard-event]
verify_jwt = true

[functions.clear-seller-dashboard-event]
verify_jwt = true

# Public GET (?t=) for buyer receipt HTML; POST validates caller JWT in function code.
[functions.buyer-sale-receipt]
verify_jwt = false

[functions.pos-complete-sale]
verify_jwt = true

[functions.notify-seller-on-check-in]
verify_jwt = true

# Validates organizer JWT in function code; sends seller SMS OTP via anon Auth client.
# Deploy with JWT verification OFF so browser OPTIONS preflight succeeds (Expo Web / localhost).
#   supabase functions deploy send-seller-check-in-sms --no-verify-jwt
[functions.send-seller-check-in-sms]
verify_jwt = false

# Public GET (?t=) for QR handoff preview; POST validates JWT in function code.
[functions.pos-receipt-intent]
verify_jwt = false

